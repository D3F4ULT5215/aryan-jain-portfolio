<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements — Aryan Jain</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Caveat:wght@400..700&family=Azeret+Mono:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="styles.css">

    <style>
        /* Lock scrolling on this page for the interactive flipbook experience */
        body { overflow: hidden; background-color: var(--text-primary); }
    </style>
</head>
<body>
    <!-- Page Transition Overlay -->
    <div class="page-transition" id="page-transition">
        <div class="transition-text" id="transition-text">LOADING</div>
    </div>

    <!-- Custom Cursor -->
    <div id="cursor" class="custom-cursor"></div>

    <section class="book-section">
        <!-- Navigation -->
        <nav class="site-nav-achievements nav-links">
            <a href="index.html#experience" class="back-link magnetic" style="display: inline-block;">← BACK TO PORTFOLIO</a>
        </nav>

        <!-- StPageFlip Container -->
        <div class="book-container">
            <div class="flip-book" id="book">
                <!-- PAGE 1: Hard Cover Front -->
                <div class="page page-cover page-cover-top" data-density="hard">
                    <div class="page-content">
                        <div class="cover-title">MY<br>CERTIFICATES</div>
                        <p class="cover-subtitle">DRAG CORNER TO OPEN</p>
                    </div>
                </div>

                <!-- PAGE 2: Hard Cover Inside -->
                <div class="page page-cover page-cover-top" data-density="hard">
                    <div class="page-content inside-cover">
                        <!-- Blank textured inside -->
                    </div>
                </div>

                <!-- PAGE 3: C Language -->
                <div class="page">
                    <div class="page-content">
                        <div class="cert-name">C Language</div>
                        <div class="cert-image-container">
                            <img src="certificate_placeholder.png" alt="C Language Certificate" class="cert-img">
                        </div>
                        <div class="cert-stamp">Verified</div>
                    </div>
                </div>

                <!-- PAGE 4: Python -->
                <div class="page">
                    <div class="page-content">
                        <div class="cert-name">Python Basics</div>
                        <div class="cert-image-container">
                            <img src="certificate_placeholder.png" alt="Python Certificate" class="cert-img">
                        </div>
                    </div>
                </div>

                <!-- PAGE 5: Java -->
                <div class="page">
                    <div class="page-content">
                        <div class="cert-name">Intro to Java</div>
                        <div class="cert-image-container">
                            <img src="certificate_placeholder.png" alt="Java Certificate" class="cert-img">
                        </div>
                    </div>
                </div>

                <!-- PAGE 6: Machine Learning -->
                <div class="page">
                    <div class="page-content">
                        <div class="cert-name">Machine Learning</div>
                        <div class="cert-image-container">
                            <img src="certificate_placeholder.png" alt="Machine Learning Certificate" class="cert-img">
                        </div>
                        <div class="cert-stamp">Excellence</div>
                    </div>
                </div>

                <!-- PAGE 7: Operating Systems -->
                <div class="page">
                    <div class="page-content">
                        <div class="cert-name">Operating Systems</div>
                        <div class="cert-image-container">
                            <img src="certificate_placeholder.png" alt="OS Certificate" class="cert-img">
                        </div>
                    </div>
                </div>

                <!-- PAGE 8: Blank Soft Page -->
                <div class="page">
                    <div class="page-content">
                        <!-- Intentionally left blank for pacing -->
                    </div>
                </div>

                <!-- PAGE 9: Hard Cover Inside Back -->
                <div class="page page-cover page-cover-bottom" data-density="hard">
                    <div class="page-content inside-cover">
                        <!-- Blank textured inside -->
                    </div>
                </div>

                <!-- PAGE 10: Hard Cover Back -->
                <div class="page page-cover page-cover-bottom" data-density="hard">
                    <div class="page-content">
                        <div class="cover-title">THE<br>END</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Lenis Smooth Scrolling Library -->
    <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>
    
    <!-- StPageFlip Library -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <!-- Global Scripts (Cursor, Transition, etc.) -->
    <script src="script.js"></script>
    
    <!-- Flipbook Initialization Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Allow magnetic custom cursor hover on book elements
            const bookContainer = document.getElementById('book');
            bookContainer.addEventListener('mouseenter', () => document.getElementById('cursor').classList.add('hovering'));
            bookContainer.addEventListener('mouseleave', () => document.getElementById('cursor').classList.remove('hovering'));

            setTimeout(() => {
                const isMobile = window.innerWidth <= 768;
                
                // Initialize StPageFlip
                const pageFlip = new St.PageFlip(document.getElementById('book'), {
                    width: isMobile ? window.innerWidth * 0.95 : Math.min(600, window.innerWidth * 0.45), // Base dimensions
                    height: isMobile ? window.innerHeight * 0.75 : Math.min(800, window.innerHeight * 0.8),
                    size: "stretch", // Stretches to container
                    minWidth: 280,
                    maxWidth: isMobile ? 600 : 700,
                    minHeight: 400,
                    maxHeight: 900,
                    maxShadowOpacity: 0.5,
                    showCover: true,
                    usePortrait: true, // Forces single-page view on narrow mobile screens
                    mobileScrollSupport: false // Disable scrolling on the book
                });

                // Load pages from DOM
                pageFlip.loadFromHTML(document.querySelectorAll('.page'));
                
                // Expose standard keyboard arrows to the library
                document.addEventListener('keydown', (e) => {
                    if(e.key === 'ArrowRight') pageFlip.flipNext();
                    if(e.key === 'ArrowLeft') pageFlip.flipPrev();
                });

            }, 500); // Slight delay ensures DOM styles are loaded before canvas dimensions calculate
        });
    </script>
</body>
</html>
